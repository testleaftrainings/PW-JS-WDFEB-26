In TypeScript (and JavaScript), true constructor overloading like in Java or C# does NOT exist ❌

🔹 What is Constructor Overloading (Concept)

Constructor overloading means:

Having multiple constructors with different parameter lists in the same class.

👉 Example in Java:

Employee(String name)
Employee(String name, String id)

🔹 How TypeScript Handles It

TypeScript supports constructor overloading using signatures + single implementation.

You define multiple constructor signatures, but only one actual constructor.

🔹 Modify Sample program with Overloading

class Employee3 {

    empName: string
    empid: string

    // Constructor overload signatures
    constructor(name: string)
    constructor(name: string, id: string)

    // Single implementation
    constructor(name: string, id?: string) {
        console.log("Constructor called");

        this.empName = name
        this.empid = id ?? "DefaultID"  // fallback if id not provided
    }

    printEmployeeDeatils() {
        console.log(`Employee name is ${this.empName}, id is ${this.empid}`);
    }
}

// Usage
const emp1 = new Employee3("Hari")
emp1.printEmployeeDeatils()

const emp2 = new Employee3("Ravi", "emp456")
emp2.printEmployeeDeatils()

🔹 Key Points (Important)
❌ TypeScript does NOT support multiple constructors directly
✅ Use constructor overload signatures
✅ Use optional parameters (?) or union types
✅ Handle logic inside a single constructor

“TypeScript doesn’t support true constructor overloading like Java. Instead, we define multiple constructor signatures and implement a single constructor using optional parameters or conditions.”

