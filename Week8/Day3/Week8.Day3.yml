username: () => this.lppage.getByRole(...)
username → 🗝️ key
() => this.lppage.getByRole(...) → 📦 value (function)
⚡ Important Insight

Here the value is not a direct locator, it’s a function returning a locator

👉 So it's:

key → function → returns locator

🧪 Why function instead of direct value?

Instead of:

username: this.lppage.getByRole(...)

You used:

username: () => this.lppage.getByRole(...)

👉 This is called lazy evaluation

Benefits:
Locator is created only when needed
Avoids stale element issues
Keeps it reusable and clean
🎯 How you use it
await this.selectors.username().fill("admin")

👉 Notice the () → because it’s a function

🧩 Simple analogy
const obj = {
    value: 10,
    getValue: () => 10
}
value → direct value
getValue → function returning value

👉 Your selectors follow the second pattern

🚀 One-line summary

Yes, it's key-value — where value is a function that returns a locator.


