-------------------------------------------------------------------------------

In **Playwright**, both **`innerText()`** and **`textContent()`** are used to get text from elements, but they behave differently — similar to how they work in the browser DOM.

Here’s a clear comparison:

---

## ✅ 1. `innerText()`

### ✔ What it does

* Returns **visible text only**
* Respects **CSS styles**
* Ignores hidden elements
* Similar to what a **user sees on screen**

### ✔ Example

```ts
const text = await page.locator('#message').innerText();
console.log(text);
```

### ✔ If HTML is:

```html
<div id="message">
  Hello
  <span style="display:none">Secret</span>
</div>
```

### ✔ Output

```
Hello
```

Hidden text is ignored.

---

## ✅ 2. `textContent()`

### ✔ What it does

* Returns **all text**
* Includes hidden elements
* Does NOT consider CSS
* Faster than `innerText()`

### ✔ Example

```ts
const text = await page.locator('#message').textContent();
console.log(text);
```

### ✔ Output

```
Hello Secret
```

Hidden text is included.

---

## ✅ Key Differences

| Feature              | innerText() | textContent() |
| -------------------- | ----------- | ------------- |
| Visible text only    | ✅ Yes       | ❌ No          |
| Includes hidden text | ❌ No        | ✅ Yes         |
| Respects CSS         | ✅ Yes       | ❌ No          |
| Matches user view    | ✅ Yes       | ❌ No          |
| Performance          | Slower      | Faster        |

---

## ✅ Best Practice in Playwright

### ✔ Use `innerText()` when:

* Testing UI text
* Verifying what user sees

Example:

```ts
await expect(page.locator('#status')).toHaveText('Success');
```

This internally behaves like **innerText()**.

---

### ✔ Use `textContent()` when:

* Need raw HTML text
* Hidden text matters
* Performance important

Example:

```ts
const rawText = await locator.textContent();
```

---

## ✅ Easy Way to Remember

**innerText → "Inside Screen"**
👉 What user **sees**

**textContent → "Total Content"**
👉 Everything in DOM
