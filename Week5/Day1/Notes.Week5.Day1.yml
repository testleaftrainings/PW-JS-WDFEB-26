Playwright Locators Using TestId :
----------------------------

## Step 1 – What you configured

```ts
use: {
  testIdAttribute: 'data-id'
}
```

### Meaning in simple words:

You told Playwright:

> “From now on, whenever I say **getByTestId**,
> don’t look for `data-testid`,
> instead look for `data-id`.”

So you **reprogrammed Playwright’s brain**.

---

## Step 2 – Your code

```ts
await page.getByTestId('MOBHFSCEDQXXDXUQ')
         .locator('.RG5Slk')
         .click();
```

---

## Layman analogy 

### Imagine a shopping mall 🏬

Each shop has:

* a **shop number** → `data-id`
* inside the shop → different counters (`div`, `span`, etc.)

---

### You tell the security guard (Playwright):

> “From today, when I say *shop id*, use the **shop number board**.”

That’s this:

testIdAttribute = 'data-id'

---

### Now you say:

getByTestId("MOBHFSCEDQXXDXUQ")

Playwright internally does:

> “Go and find the element which has:
html
> data-id="MOBHFSCEDQXXDXUQ"

Exactly like:

```css
[data-id="MOBHFSCEDQXXDXUQ"]
```

---

### Then you say:

```ts
.locator('.RG5Slk')
```

Meaning:

> “Inside that shop, go to the counter named `RG5Slk`”

---

### Then:

```ts
.click();
```

Meaning:

> “Now physically click that counter”
---

## Why this is powerful (real-life reason)

Without config:

```ts
getByTestId() → only data-testid
```

With config:

```ts
getByTestId() → any attribute YOU decide
```

So your framework becomes:

* readable
* business-friendly
* independent of HTML structure

---

> “We are not changing our code to match the tool.
> We are changing the tool to match the application.”

This is how we do in real time projects.

