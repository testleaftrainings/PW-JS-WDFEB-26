## 🔹 Where are images stored?

### ✅ 1. Your manual screenshot (YOU controlled it)

📍 Location:

```bash
screenshot/base.png
```

👉 This is saved exactly where you specified
👉 Relative to your project root

✔ This happens because of:

```ts
path: "screenshot/base.png"
```

---

### ✅ 2. Playwright snapshot (AUTO handled)

Even though you gave a path above, this line:

```ts
expect(ss).toMatchSnapshot()
```

👉 STILL creates/uses snapshot here:

```bash
tests/Week7/Day1/visualRegressionTesting.spec.ts-snapshots/
```

📄 Example:

```bash
Visual-regression-testing-1-chromium-win32.png
```

---

### ✅ 3. Actual + Diff (if failure)

📍 Stored in:

```bash
test-results/
```

---

## 🔹 Important concept (this is where many get confused)

👉 `page.screenshot({ path })`
= **Manual storage (your control)**

👉 `toMatchSnapshot()`
= **Playwright visual testing system (separate)**

⚠️ These are **independent**

---

## 🔹 What your code is doing internally

1. Takes screenshot → saves in:

   ```
   screenshot/base.png
   ```

2. Same image (`ss`) passed to:

   ```
   toMatchSnapshot()
   ```

3. Playwright:

   * compares with baseline in `*-snapshots`
   * generates actual/diff in `test-results`

---

## 🔹 Interview-level explanation 🎯

> Even if we pass a custom path to `page.screenshot()`, Playwright’s `toMatchSnapshot()` does not use that file as baseline. It maintains its own snapshot folder and comparison mechanism independently.

---

## 🔹 If your intention was this 👇

👉 “Use `screenshot/base.png` as baseline”

❌ This will NOT happen automatically

---

## 🔹 Correct way to control snapshot name

```ts
expect(ss).toMatchSnapshot("base.png")
```

Then Playwright stores:

```bash
*-snapshots/base.png
```

---

## 🔹 Simple takeaway

| Action                      | Storage Location   |
| --------------------------- | ------------------ |
| `page.screenshot({ path })` | Your custom folder |
| `toMatchSnapshot()`         | `*-snapshots/`     |
| Failures                    | `test-results/`    |

