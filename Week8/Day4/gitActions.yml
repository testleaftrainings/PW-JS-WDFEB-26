Extra Notes :
------------

🔹 U — Untracked

Means:

This file is new and Git is not tracking it yet.

It exists on your computer, but Git does not know about it.

Example from your code:

01-playwrightlocators.spec.ts   U
NotesWeek2Day3.yml             U


These files were created but not added to Git yet.

To track them:

git add <filename>


or

git add .

🔹 M — Modified

Means:

This file was already in Git, but you changed it after the last commit.

Git is tracking it, but your latest changes are not committed yet.

To save the change:

git add <file>
git commit -m "Update something"

 Simple mental model
Symbol	Meaning
U	New file – Git doesn’t know it yet
M	Old file – You edited it

One-line summary 🎯

U = New file not yet in Git
M = Existing file changed after last commit

