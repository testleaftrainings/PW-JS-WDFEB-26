Absolute Xpath :
/html/body/div[2]/div[2]/div/form/p/input


Relative Xpath :

Two types :

Basic Relative Xpath :

//tagName[@attribute='attributeValue’] --> attribute based xpath
//tagName[text()='text value in DOM']  --> text based xpath
//tagName[contains(@attribute, 'Partial value of the attribute')] --> partial attribute based xpath
//tagname[contains(text(),' Partial text in my DOM' ')] --> partial text based xpath
(//tagName[@attribute='attributeValue'])[index] --> collection based xpath
 


Advanced Relative Xpath Locators :
--------------------------
Parent To child   : 
-----------------
( parent relative xpath)/(tagName of child)

(//form[@id="login"]/p)[3]


GrandParent to child Relation   :
--------------------------------
GrandParent relative xpath//tagName of grand child

(//form[@id="login"]//label)[2]

--------------------------------------------------------

Child to parent :      
----------------
Child relative xpath/parent::parent tagName --> //input[@id="username"]/parent::p

//input[@id="username"]/parent::p

Grandchild to grandparent :
-----------------------------
GrandChild relative xpath/ancestor::tagName of grand parent --> //input[@id="password"]/ancestor::p

//label[text()="Username"]/ancestor::form

---------------------------------------------------------------------------

Elder sibling to younger sibling : (Top to Bottom)
----------------------------------
(Elder sibling relative xpath)/following-sibling::tagName of younger sibling --> //label[text()='Username']/following-sibling::input

//label[text()="Username"]/following-sibling::input

Younger sibling to Elder Sibling : (Bottom to Top)
-----------------------------------
(Younger sibling relative xpath)/preceding-sibling::tagName of elder sibling --> //input[@id='username']/preceding-sibling::label

(//input[@id="username"]/preceding-sibling::label)


------------------------------------------------------------


Elder Cousin to Younger Cousin : (Top to Bottom)
--------------------------------
Elder cousing relative xpath/following::tagName of younger Cousin --> //input[@id="username"]/following::label

//input[@id="username"]/following::input

Younger Cousin to Elder Cousin: (Bottom to Top)
-------------------------------
Younger cousin xpath/preceding::tagName of Elder cousin --> //label[text()='Password']/preceding::input

(//input[@class="decorativeSubmit"]/preceding::input)[1]



Select options used based on priority:
-----------------------------------------


1. Select By Value :
-Stable and less likely to change since the value is often connected to your backend

  await page.selectOption(`#createLeadForm_dataSourceId`,{value:"LEAD_DIRECTMAIL"})

2. Select By Label :
Tend to change due to business requirements / geography
Example travel name of places in your website

3. Select BY Index :
When ever there is not change in the order of your dropdown can go for select by index 

Non-select tags
---------------
1. Locate your dropdown and use click()/ enter the value
2. locate the particular option from the dropdownlist - clickit



Ways of handling dropdown:
----------------------------

| Method     | Stability | Readability | Use When...                         |
| ---------- | --------- | ----------- | ----------------------------------- |
| By value |   High    |   Low       | Most reliable, backend-driven IDs   |
| By label |   Medium  |   High      | UI is stable or for quick checks    |
| By index |   Low     |   Low       | Only if no other way /static order |

