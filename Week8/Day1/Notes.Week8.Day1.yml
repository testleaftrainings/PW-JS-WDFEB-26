Inheritance :

1. Single Inheritance :
When a class inherits another class

classA{} // 01-accessModifiers.ts --> Base class
classB extends A{} // 04-accessModifiersPro.ts extends 03-accessModifiers.ts

------------------------------

Single inheritance example :
---

class LoginPage{ // parent class

loginPage properties 
loginPage methods
}
----------------------------------------
class WelcomePage extends LoginPage  { // child class

loginPage properties 
loginPage methods

        +

welcomePage properties
welcomePage methods


}


------------------------------
2. Multilevel Inheritance :
When a class inherits another class which is already inherited from another class

class A{}

class B extends A{}
class C extends B{}

------------------------------

Multilevel inheritance example :
---

class LoginPage{ // grandparent class

loginPage properties 
loginPage methods
}
----------------------------------------
class WelcomePage extends LoginPage  { // parent class

loginPage properties 
loginPage methods

        +

welcomePage properties
welcomePage methods
}

----------------------------------------

export class HomePage extends WelcomePage {  // grandChild Page

loginPage properties  --> properties of grandparent
loginPage methods

        +

welcomePage properties --> properties of parent
welcomePage methods

        +
  
  homePage properties //--> properties of grandchild Page
  homePage methods
}

------------------------------
3. Hierarchical inheritance 
 When multiple classes inherits a single class

class A{} // Super class

class B extends A{}
class C extends A{}

4. Hybrid Inheritance
A combination of two or more types of inheritnace (e.x : multilevel and Hierarchical)


5.Multiple Inheritance
When a derived class inherits more than one parent class

Typescript does not support multiple inheritnace using classes.
Can be achieved through interface.

