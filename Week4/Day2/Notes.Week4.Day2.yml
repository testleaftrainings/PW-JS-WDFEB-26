Sort Method internal mechanism:
-------------------------------

let numberArray = [10, 8, 9, 7];
numberArray.sort((a, b) => a - b);


### 🟢 Step 1: Initial Array

[10, 8, 9, 7]
---

### 🟢 Step 2: First Comparisons

1. Compare **10 and 8**

   * a = 10, b = 8 → `10 - 8 = 2` (positive)
   * Swap → `[8, 10, 9, 7]`

2. Compare **10 and 9**

   * a = 10, b = 9 → `10 - 9 = 1` (positive)
   * Swap → `[8, 9, 10, 7]`

3. Compare **10 and 7**

   * a = 10, b = 7 → `10 - 7 = 3` (positive)
   * Swap → `[8, 9, 7, 10]` => First pass result

---

### 🟢 Step 3: Next Pass

1. Compare **8 and 9**

   *  a = 8,b = 9 → `8 - 9 = -1` (negative)
   * Keep order → `[8, 9, 7, 10]`

2. Compare **9 and 7**

   * a = 9, b = 7 → `9 - 7 = 2` (positive)
   * Swap → `[8, 7, 9, 10]`

---

### 🟢 Step 4: Another Pass

1. Compare **8 and 7**

   * a = 8, b = 7 → `8 - 7 = 1` (positive)
   * Swap → `[7, 8, 9, 10]`

Now everything is in order 

---

### Final Sorted Array

[7, 8, 9, 10]

---

Quick Recap:

* `a` and `b` are just **two numbers being compared**.
* The compare function `(a - b)` tells JavaScript whether to swap them.


----------------------------------------------------------------------


let heterogenousArray = [10,9,8,7,"Javascript","TypeScript","C#"];

let sortedArray = heterogenousArray.sort((a,b)=>{
//Check if both are numbers

if (typeof a === "number" && typeof b ==="number"){
return a-b; // sort the numbers in ascending order
}

//if one is number and one is string
if( typeof a === "number"){
return -1; // number has to come before string
}

if (typeof b==="number"){
return 1;// string comes after the number
}

//if both are strings
return a.localeCompare(b); // sort strings alphabetically
});

console.log(sortedArray);

