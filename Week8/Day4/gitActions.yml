6. Real-Time Team Workflow (Feature → PR → Review → Merge)

This is how teams actually work in companies using GitHub.

🔹 Step 1: Always Start from Latest main
git checkout main
git pull origin main

👉 Ensures you are working on latest code

🔹 Step 2: Create Feature Branch
git checkout -b feature/login-functionality

👉 Naming convention:

feature/... → new feature
bugfix/... → bug fix
hotfix/... → urgent fix
🔹 Step 3: Do Your Work

Example:

Add Playwright test
Modify existing code
🔹 Step 4: Commit Changes
git add .
git commit -m "Add login functionality test using Playwright"
🔹 Step 5: Push Branch to GitHub
git push origin feature/login-functionality

👉 Now branch is visible in GitHub

🔹 Step 6: Create Pull Request (PR)

In GitHub UI:

Click "Compare & pull request"
Add:
Title
Description
Select:
Base → main
Compare → feature/login-functionality
🔹 Step 7: Code Review Process

Team members will:

Review your code
Suggest changes
Approve PR

👉 If changes requested:

# Make changes
git add .
git commit -m "Fix review comments"
git push origin feature/login-functionality

👉 PR updates automatically ✅

🔹 Step 8: Merge PR

Once approved:

Click Merge Pull Request
Your code goes into main
🔹 Step 9: Clean Up Branch
git branch -d feature/login-functionality
git push origin --delete feature/login-functionality


🔄 Visual Flow (Simple Understanding)
main ────●──────────────●───────────
          \
           \→ feature/login ──●──●──●
                              ↓
                         Pull Request
                              ↓
                            Merge



Real-World Rules (IMPORTANT)

✅ Never commit directly to main
✅ Always use branches
✅ Always create PR
✅ Always pull latest before starting
✅ Use meaningful commit messages

 One-line Summary

👉 Create Branch → Work → Commit → Push → PR → Review → Merge