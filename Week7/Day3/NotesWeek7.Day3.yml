Constructor:

Definition
A constructor in TypeScript is a method named constructor() that runs once at the time of object creation and sets up the initial state of the object.
Or a Special method to initialize the object

"this" keyword definition in ts :

In TypeScript, this refers to the current instance of the class or the object that invokes the method.


